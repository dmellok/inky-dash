<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.name|default("Compose") }}</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #1a1612;
    }
    .panel {
      position: relative;
      width: {{ page.panel.w }}px;
      height: {{ page.panel.h }}px;
      overflow: hidden;
    }
    .cell {
      position: absolute;
      box-sizing: border-box;
      overflow: hidden;
    }
    .cell.error {
      outline: 2px solid #c97c70;
    }
  </style>
</head>
<body data-for-push="{{ '1' if for_push else '0' }}">
  <div class="panel">
    {% for cell in page.cells %}
    <div class="cell"
         data-cell-id="{{ cell.id }}"
         data-plugin="{{ cell.plugin }}"
         data-options='{{ cell.options|tojson }}'
         data-cell-w="{{ cell.w }}"
         data-cell-h="{{ cell.h }}"
         data-panel-w="{{ page.panel.w }}"
         data-panel-h="{{ page.panel.h }}"
         style="left: {{ cell.x }}px; top: {{ cell.y }}px; width: {{ cell.w }}px; height: {{ cell.h }}px;"></div>
    {% endfor %}
  </div>
  <script type="module" src="{{ url_for('static', filename='composer.js') }}"></script>
</body>
</html>
