<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.name|default("Compose") }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='icons/phosphor.css') }}">
  <style>
    {{ page.font_face_css|safe }}

    html, body { margin: 0; padding: 0; }
    body {
      font-family: '{{ page.font_family }}', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: {{ page.bleed_color|default('#ffffff') }};
      color: {{ page.palette.fg }};
    }
    .panel {
      position: relative;
      width: {{ page.panel.w }}px;
      height: {{ page.panel.h }}px;
      overflow: hidden;
      /* Background that "bleeds" between cells when there's a gap or
         rounded corners. Per-page user pick (default white). */
      background: {{ page.bleed_color|default('#ffffff') }};
    }
    .cell {
      position: absolute;
      box-sizing: border-box;
      overflow: hidden;
      border-radius: {{ page.corner_radius }}px;
      /* Theme-aware widget boundary. On the Spectra 6 panel, light theme
         surface (#fff) and bg (#fbf7f1) both quantise to white, so without
         this border widgets would visually merge into the panel. The
         outline lives "inside" the cell (outline-offset: -1px) so it
         doesn't shrink the plugin's render area — plugins still paint
         pixel-exact at their declared cell w×h. */
      outline: 1px solid var(--theme-divider);
      outline-offset: -1px;
      /* Each cell is a sizing container so plugins can use cqw/cqh CSS units
         to auto-scale to their cell dimensions. Avoids overflow at the panel
         level — plugin CSS scales itself, no JS measuring needed. */
      container-type: size;
    }
    /* full_bleed widgets paint edge-to-edge — kill the chrome outline. */
    .cell.full-bleed {
      outline: 0;
    }
    .cell.error {
      outline: 2px solid {{ page.palette.danger }};
    }
  </style>
</head>
<body data-for-push="{{ '1' if for_push else '0' }}">
  <div class="panel">
    {% for cell in page.cells %}
    <div class="cell{% if cell.full_bleed %} full-bleed{% endif %}"
         data-cell-id="{{ cell.id }}"
         data-plugin="{{ cell.plugin }}"
         data-options='{{ cell.options|tojson }}'
         data-data='{{ cell.data|tojson }}'
         data-cell-w="{{ cell.w }}"
         data-cell-h="{{ cell.h }}"
         data-panel-w="{{ page.panel.w }}"
         data-panel-h="{{ page.panel.h }}"
         data-theme-palette='{{ cell.palette|tojson }}'
         data-font-family="{{ cell.font_family }}"
         style="left: {{ cell.x }}px; top: {{ cell.y }}px; width: {{ cell.w }}px; height: {{ cell.h }}px;
                font-family: '{{ cell.font_family }}', system-ui, sans-serif;
                {% for key, val in cell.palette.items() %}--theme-{{ key }}: {{ val }};{% endfor %}"></div>
    {% endfor %}
  </div>
  <!-- Chart.js available globally to all widget shadow DOMs as window.Chart.
       Vendored locally (static/lib/) so the dashboard renders without
       network access — important on the panel itself. -->
  <script src="{{ url_for('static', filename='lib/chart.umd.min.js') }}"></script>
  <script type="module" src="{{ url_for('static', filename='composer.js') }}"></script>
  <script>
    // Live palette overrides via postMessage. Used by the Themes page (and
    // anything else embedding compose output in an iframe) to re-theme the
    // rendered cells without reloading. Message shape:
    //   { type: 'palette', palette: { bg: '#...', accent: '#...', ... } }
    // Optional `cellId` scopes the override to a single cell; without it,
    // all cells are updated.
    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (!msg || msg.type !== 'palette' || typeof msg.palette !== 'object') return;
      const palette = msg.palette;
      const cells = msg.cellId
        ? document.querySelectorAll(`.cell[data-cell-id="${msg.cellId}"]`)
        : document.querySelectorAll('.cell');
      cells.forEach((cell) => {
        for (const [k, v] of Object.entries(palette)) {
          if (typeof v === 'string') cell.style.setProperty(`--theme-${k}`, v);
        }
      });
    });
  </script>
</body>
</html>
